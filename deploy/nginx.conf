# Reverse proxy Nginx pour ComRoster (HTTPS).
# Trois points critiques :
#   1. Le cookie de session est marqué `Secure` en prod → l'admin n'est accessible
#      qu'en HTTPS. Servir en HTTP simple empêche silencieusement la connexion.
#   2. Le SSE (/events) exige `proxy_buffering off`, sinon les événements restent
#      bloqués côté proxy et le display ne se met jamais à jour.
#   3. Derrière ce proxy, lancer l'app avec COMROSTER_BEHIND_PROXY=true, sinon le
#      rate-limit du login voit 127.0.0.1 pour tout le monde (compteur partagé).

# HTTP → redirection systématique vers HTTPS.
server {
    listen 80;
    server_name comroster.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name comroster.local;

    # Certificat TLS — remplacer par les chemins réels (Let's Encrypt ou certificat interne).
    ssl_certificate     /etc/ssl/comroster/fullchain.pem;
    ssl_certificate_key /etc/ssl/comroster/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Une fois le TLS validé : force les navigateurs à rester en HTTPS.
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # https → Flask voit la bonne origine
    }

    location /events {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;            # INDISPENSABLE au SSE
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
}

# Réseau de confiance sans TLS ? (régie isolée, aucun accès externe)
# Alternative : servir en HTTP simple en lançant gunicorn avec FLASK_DEBUG=true,
# ce qui désactive le flag Secure — à n'utiliser QUE sur un LAN fermé.
