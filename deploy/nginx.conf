# Reverse proxy Nginx pour ComRoster.
# Point critique : le SSE (/events) exige la désactivation du buffering,
# sinon les événements restent bloqués côté proxy et le display ne se met jamais à jour.
server {
    listen 80;
    server_name comroster.local;

    # En prod réelle : terminer le TLS ici (listen 443 ssl) et rediriger 80 → 443,
    # car le cookie de session est marqué Secure.

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /events {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;            # INDISPENSABLE au SSE
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }
}
