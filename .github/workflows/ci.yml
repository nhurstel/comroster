name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (ruff + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: ruff (Python)
        # Tout le dépôt, pas seulement le paquet : les tests et scripts étaient hors
        # couverture, et 7 erreurs y sont passées inaperçues jusqu'au 2026-07-21.
        # (ruff respecte .gitignore, les archives locales sont donc exclues.)
        run: pip install ruff && ruff check .
      - name: shellcheck (scripts déploiement)
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck && shellcheck deploy/*.sh

  unit:
    name: Tests unitaires & intégration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Dépendances
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: pytest
        run: pytest -q            # le marqueur e2e est exclu par défaut (pytest.ini)

  e2e:
    name: Tests bout-en-bout (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Dépendances
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Navigateur Chromium
        run: python -m playwright install --with-deps chromium
      - name: pytest e2e
        run: pytest tests/e2e -m e2e
