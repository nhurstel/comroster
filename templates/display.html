<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Tableau d'affectation des beltpacks d'intercom – {{ initial_data.title }}">
  <title>{{ initial_data.title }} – ComRoster</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <style>
    body.display-page {
      --display-header-height: 3.5rem; --display-footer-height: 3rem;
      height: 100vh; overflow: hidden;
    }
    /* Header discret */
    .display-page header {
      height: 3.5rem;
      padding: 0 1.75rem;
      background: rgba(10, 16, 28, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: none;
      gap: 1.5rem;
    }
    body[data-theme="day"] .display-page header,
    .display-page[data-theme="day"] header { background: rgba(255, 255, 255, 0.5); }
    .display-page header::before { display: none; }
    .display-page .board-meta { gap: 0; min-width: 0; }
    .display-page .board-meta h1 { font-size: 1.15rem; font-weight: 700; text-shadow: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .display-page .board-meta h2 { font-size: 0.75rem; font-weight: 500; color: var(--fg-muted); }
    .display-page .header-actions { gap: 1.75rem; }
    #display-scroll {
      flex: 1; overflow: auto;
      padding: calc(var(--display-header-height) + 2rem) 3rem calc(var(--display-footer-height) + 2rem);
      scrollbar-width: none; -ms-overflow-style: none; -webkit-overflow-scrolling: touch;
    }
    #display-scroll::-webkit-scrollbar { display: none; }
    .display-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .block {
      --block-accent: var(--primary);
      background: var(--glass-bg); backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border); border-top: 3px solid var(--block-accent);
      border-radius: var(--radius-lg);
      padding: 1.4rem 1.6rem 1.6rem; box-shadow: var(--shadow-md);
      display: flex; flex-direction: column; gap: 0.9rem;
    }
    .block-header { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .block-header h3 { margin: 0; font-size: 1.4rem; font-weight: 700; }
    .block-items { display: flex; flex-direction: column; gap: 0.6rem; }
    .person {
      background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border);
      border-radius: var(--radius-md); padding: 0.85rem 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    body[data-theme="day"] .person { background: rgba(15,23,42,0.03); border-color: rgba(15,23,42,0.1); }
    .bp-badge {
      flex: 0 0 auto; min-width: 3rem; height: 3rem; padding: 0 0.6rem;
      display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
      border-radius: var(--radius-md); background: var(--block-accent); color: #04121b;
      font-weight: 800; line-height: 1; box-shadow: var(--shadow-sm);
    }
    .bp-badge .bp-n { font-size: 1.4rem; font-variant-numeric: tabular-nums; }
    .bp-badge .bp-l { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.8; }
    .person-body { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
    .person .role { font-size: 1.3rem; font-weight: 700; color: var(--fg); }
    .person .name { font-size: 1rem; color: var(--fg-muted); }
    .empty-hint { padding: 1.5rem; text-align: center; color: var(--fg-subtle); font-style: italic; }
    .board-clock {
      font-size: 1.25rem; font-weight: 600; font-variant-numeric: tabular-nums;
      color: var(--fg); min-width: 7ch; text-align: right;
    }
    /* Stats : texte discret en ligne, sans boîte */
    .stats-container { display: flex; align-items: baseline; gap: 1.25rem; }
    .stat-item { display: flex; align-items: baseline; gap: 0.3rem; padding: 0; background: none; border: none; }
    .stat-value { font-size: 1.05rem; font-weight: 700; color: var(--primary-light); font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 0.8rem; text-transform: none; letter-spacing: 0; color: var(--fg-muted); }
    .display-page .status-badge { background: transparent; border: none; box-shadow: none; padding: 0; font-size: 0.85rem; }
    body.display-page footer { justify-content: center; flex-wrap: wrap; gap: 1rem 2rem; }
    .created-by { font-weight: 600; color: var(--fg); }
    @media (max-width: 768px) {
      #display-scroll { padding: calc(var(--display-header-height) + 1rem) 1rem calc(var(--display-footer-height) + 1rem); }
      .display-grid { grid-template-columns: 1fr; gap: 1.5rem; }
    }
  </style>
</head>
<body class="display-page" data-theme="{{ initial_data.theme or 'night' }}">
  <header>
    <div class="board-meta">
      <h1 id="board-title">{{ initial_data.title }}</h1>
      <h2 id="board-subtitle" {% if not initial_data.subtitle %}hidden{% endif %}>{{ initial_data.subtitle or '' }}</h2>
    </div>
    <div class="header-actions">
      <div class="stats-container">
        <div class="stat-item"><div class="stat-value" id="total-groups">0</div><div class="stat-label">Groupes</div></div>
        <div class="stat-item"><div class="stat-value" id="total-people">0</div><div class="stat-label">Beltpacks</div></div>
      </div>
      <div class="board-clock" id="board-clock"></div>
      <div class="status-badge" id="live-indicator" role="status" aria-live="polite">
        <span class="pulse" aria-hidden="true"></span>
        <span class="status-text">En direct</span>
      </div>
    </div>
  </header>
  <main id="display-scroll"><div class="display-grid" id="display-grid"></div></main>
  <footer>
    <span class="created-by">Créé par Nathan HURSTEL</span>
    <div class="footer-meta">
      <span>Dernière publication : <time id="updated-at-time">{{ initial_data.updated_at }}</time></span>
      <span class="sync-hint" id="sync-hint">Mises à jour en direct actives</span>
    </div>
  </footer>
  <script>window.__INITIAL__ = {{ initial_data|tojson }};</script>
  <script src="{{ url_for('static', filename='js/display.js') }}"></script>
</body>
</html>
